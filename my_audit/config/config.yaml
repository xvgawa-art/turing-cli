# my_audit Configuration

# Agent 类型定义
agent_types:
  # 示例 Agent 类型
  example_agent:
    description: "示例 Agent"
    prompt_template: "example_agent.md"

# 错误处理配置
error_handling:
  max_retries: 3
  backoff: 1.0
  strategy: "retry"  # retry, skip, abort

# 并发配置
concurrency:
  max_workers: 5
  timeout: 300
